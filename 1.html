  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0E1017; --bg2: #141720; --bg3: #1A1E2A;
      --line: #252A38; --text: #E8E0CC; --muted: #5A6070;
      --accent: #F5C842;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; }
    #hdr { position: sticky; top: 0; z-index: 200; background: rgba(20,23,32,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); }
    .brand { padding: 12px 16px 8px; display: flex; align-items: flex-start; justify-content: space-between; }
    .brand-left .eyebrow { font-size: 9px; letter-spacing: .3em; color: var(--muted); text-transform: uppercase; }
    .brand-title { font-family: 'DM Serif Display', serif; font-size: 20px; }
    .brand-title .acc { color: var(--accent); }
    .view-toggle { display: flex; gap: 4px; margin-top: 2px; }
    .vt { background: var(--bg3); color: var(--muted); border: 1px solid var(--line); border-radius: 24px; padding: 5px 12px; font-size: 10px; cursor: pointer; }
    .vt.on { background: var(--accent); color: #000; border-color: var(--accent); }
    #dtabs { display: flex; overflow-x: auto; background: var(--bg2); gap: 2px; }
    .dtab { flex-shrink: 0; background: none; border: none; border-bottom: 2px solid transparent; color: #3A3A3A; padding: 8px 12px; cursor: pointer; }
    .dtab.on { color: var(--text); }
    .view { display: none; }
    .view.on { display: block; }
    .now-playing-card {
      background: rgba(26,30,42,0.85); backdrop-filter: blur(20px);
      border-radius: 24px; margin: 12px 16px; padding: 12px 16px;
      border: 1px solid rgba(245,200,66,0.3);
    }
    .np-header { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-bottom: 8px; }
    .np-artist { font-size: 18px; font-weight: 600; color: var(--accent); font-family: 'DM Serif Display', serif; }
    .np-stage { font-size: 12px; color: #CCC; margin-top: 4px; display: flex; gap: 8px; align-items: baseline; }
    .np-time { font-size: 10px; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 20px; }
    .np-progress { margin-top: 10px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 4px; }
    .np-progress-fill { width: 0%; height: 100%; background: var(--accent); border-radius: 4px; }
    .favorites-panel { background: var(--bg2); margin: 8px 16px; border-radius: 20px; padding: 12px; border: 1px solid var(--line); }
    .fav-title { font-size: 11px; letter-spacing: 1px; color: var(--accent); margin-bottom: 8px; display: flex; justify-content: space-between; }
    .route-btn { background: var(--accent); color: #000; border: none; border-radius: 40px; padding: 4px 12px; font-size: 10px; font-weight: bold; cursor: pointer; }
    .map-container { padding: 12px; background: #0a0c12; border-radius: 28px; margin: 8px; text-align: center; }
    .map-img { width: 100%; height: auto; border-radius: 20px; display: block; }
    .stage-popup { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(20,23,32,0.98); backdrop-filter: blur(24px); border-radius: 28px; border: 1px solid rgba(245,200,66,0.4); z-index: 400; padding: 16px; max-height: 70vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.2s ease; }
    .stage-popup.show { transform: translateY(0); }
    .pop-header { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: bold; color: var(--accent); }
    .pop-close { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; }
    .show-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--line); align-items: center; }
    .show-time { font-size: 12px; color: var(--muted); }
    .show-artist { flex: 1; margin-left: 12px; font-size: 13px; }
    .fav-icon-small { cursor: pointer; margin-left: 8px; }
    .schedule-item, .az-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid #191E2A; }
    .fav-icon { cursor: pointer; font-size: 16px; color: #555; min-width: 28px; text-align: center; }
    .fav-icon.active { color: #F5C842; }
    .legend { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 8px; font-size: 9px; color: var(--muted); }
  </style>
</head>

const edges = [ ["Estrella Damm","Revolut",25], ["Estrella Damm","CUPRA",28], ["CUPRA","Occident",24], ["Occident","Schwarzkopf",22], ["Schwarzkopf","Port",18], ["Port","The Levi's Warehouse",30], ["The Levi's Warehouse","Auditori Rockdelux",20], ["Auditori Rockdelux","Plenitude",22], ["Plenitude","Estrella Damm",35], ["CUPRA","Plenitude",32] ];
function dijkstra(start, end) { 
  let dist = {}, prev = {}, nodes = Object.keys(stagePoints); 
  for(let n of nodes) dist[n]=Infinity; 
  dist[start]=0; 
  let unvisited = new Set(nodes); 
  while(unvisited.size){ 
    let u = [...unvisited].reduce((a,b)=>dist[a]<dist[b]?a:b); 
    if(u===end || dist[u]===Infinity) break; 
    unvisited.delete(u); 
    for(let [a,b,w] of edges){ 
      let nei = a===u?b: b===u?a:null; 
      if(nei && unvisited.has(nei) && dist[u]+w < dist[nei]) { dist[nei]=dist[u]+w; prev[nei]=u; } 
    } 
  } 
  let path=[], cur=end; 
  while(cur){ path.unshift(cur); cur=prev[cur]; } 
  return {dist:dist[end], path}; 
}

// 收藏管理
let favorites = new Set(JSON.parse(localStorage.getItem('primavera_favs')||'[]'));
function saveFavs() { localStorage.setItem('primavera_favs', JSON.stringify([...favorites])); renderFavUI(); refreshAllViews(); }
function toggleFav(artist) { favorites.has(artist) ? favorites.delete(artist) : favorites.add(artist); saveFavs(); }
function renderFavUI() { 
  let container = document.getElementById('favArtistsList'); 
  if(container) container.innerHTML = [...favorites].map(a=>`<div class="fav-badge" onclick="focusArtistRoute('${a.replace(/'/g,"\\'")}')">❤️ ${a}</div>`).join('')||'<div style="color:gray">点击排班/列表里的 ♡ 收藏艺人</div>'; 
}

let curDay='thu', curView='schedule', curStage=null;
function toMins(t){let[h,m]=t.split(':').map(Number);return h<8?h*60+m+1440:h*60+m;}
function getCurrentShow(day){ 
  let now = new Date(); let mins = now.getHours()*60+now.getMinutes(); 
  if(now.getMonth()!==5) mins = 21*60+30; // 演示模式
  return day.shows.find(s=>toMins(s.time)<=mins && mins<toMins(s.end)); 
}
function updateNowPlaying() { 
  let day = DAYS.find(d=>d.key===curDay); 
  if(!day) return; 
  let cur = getCurrentShow(day); 
  let card = document.getElementById('nowPlayingCard'); 
  if(cur){ 
    card.style.display='block'; 
    document.getElementById('npArtist').innerText=cur.artist; 
    document.getElementById('npStage').innerHTML=ST[cur.stage]?.e+' '+cur.stage; 
    document.getElementById('npTimeRange').innerText=`${cur.time} – ${cur.end}`; 
    let total = toMins(cur.end)-toMins(cur.time); 
    let elapsed = Math.min(total, Math.max(0, (new Date().getHours()*60+new Date().getMinutes())-toMins(cur.time))); 
    let percent = (elapsed/total)*100; 
    document.getElementById('npProgressFill').style.width=Math.min(100,percent)+'%'; 
  } else { card.style.display='none'; } 
}
function showRouteBetweenStages(startStage, endStage){ 
  if(!startStage||!endStage) return; 
  let res = dijkstra(startStage, endStage); 
  let resultDiv = document.getElementById('routeResult'); 
  if(res.dist===Infinity) resultDiv.innerText='❌ 无法规划路径'; 
  else resultDiv.innerHTML=`🚶 最少步行: ${res.dist} 分钟 · 路径: ${res.path.join(' → ')}`; 
}
function focusArtistRoute(artist){ 
  let stage = getStageFromArtist(artist, curDay); 
  if(!stage){ alert('该艺人不在当天演出'); return; } 
  let currentStage = getCurrentShow(DAYS.find(d=>d.key===curDay))?.stage; 
  if(!currentStage){ alert('无正在进行的演出'); return; } 
  showRouteBetweenStages(currentStage, stage); 
  setView('map'); 
}
function getStageFromArtist(artist, dayKey) { 
  let day = DAYS.find(d=>d.key===dayKey); 
  if(!day) return null; 
  let show = day.shows.find(s=>s.artist===artist); 
  return show ? show.stage : null; 
}
function openStagePopup(stageName) { 
  let day = DAYS.find(d=>d.key===curDay); 
  let shows = day.shows.filter(s=>s.stage===stageName).sort((a,b)=>toMins(a.time)-toMins(b.time)); 
  let si = ST[stageName]||{color:"#aaa",e:"🎵"}; 
  let popupDiv = document.getElementById('dynamicPopup'); 
  if(!popupDiv){ popupDiv = document.createElement('div'); popupDiv.id = 'dynamicPopup'; popupDiv.className = 'stage-popup'; document.body.appendChild(popupDiv); } 
  popupDiv.innerHTML = `<div class="pop-header"><span>${si.e} ${stageName}</span><button class="pop-close" onclick="this.parentElement.parentElement.classList.remove('show')">×</button></div><div class="pop-shows">${shows.length?shows.map(s=>`<div class="show-item"><div class="show-time">${s.time}</div><div class="show-artist">${s.artist}${s.hl?' ★':''}</div><div class="fav-icon-small" onclick="toggleFav('${s.artist.replace(/'/g,"\\'")}'); event.stopPropagation();">${favorites.has(s.artist)?'❤️':'♡'}</div></div>`).join(''):'<div class="pop-empty">今天暂无演出</div>'}</div>`; 
  popupDiv.classList.add('show'); 
}
function renderMapView(){ 
  let legendDiv=document.getElementById('mapLegend'); 
  legendDiv.innerHTML=Object.entries(ST).map(([k,v])=>`<span style="color:${v.color}">${v.e} ${v.s}</span>`).join(' | '); 
  updateNowPlaying(); 
  document.querySelectorAll('#stageMap area').forEach(area=>{ 
    area.onclick = (e)=>{ e.preventDefault(); let stage = area.getAttribute('data-stage'); if(stage) openStagePopup(stage); }; 
  }); 
}
function renderSchedule(){ 
  let day=DAYS.find(d=>d.key===curDay); 
  let shows=curStage?day.shows.filter(s=>s.stage===curStage):day.shows; 
  let sorted=[...shows].sort((a,b)=>toMins(a.time)-toMins(b.time)); 
  document.getElementById('fbar').innerHTML=`<div class="dbadge" style="background:${day.bc}18;border-color:${day.bc}33">★ ${day.badge}</div><div class="sfilters"><button class="sfbtn all${!curStage?' on':''}" onclick="setStage(null)">全部 (${day.shows.length})</button>${[...new Set(day.shows.map(s=>s.stage))].map(s=>{let si=ST[s]; return `<button class="sfbtn" onclick="setStage('${s}')" style="background:${curStage===s?si.color:'#1C2030'};color:${curStage===s?'#000':si.color}">${si.e} ${si.s}</button>`;}).join('')}</div>`; 
  document.getElementById('slist').innerHTML=sorted.map(show=>{ let si=ST[show.stage]; let isFav=favorites.has(show.artist); return `<div class="schedule-item" style="border-left:3px solid ${show.hl?si.color:'transparent'}"><div class="stime">${show.time}</div><div class="spill" style="background:${si.color}18;color:${si.color}">${si.e} ${si.s}</div><div style="flex:1">${show.artist}</div><div class="fav-icon ${isFav?'active':''}" onclick="toggleFav('${show.artist.replace(/'/g,"\\'")}'); event.stopPropagation();">${isFav?'❤️':'♡'}</div></div>`; }).join(''); 
  updateNowPlaying(); 
}
function renderAZ(){ 
  let day=DAYS.find(d=>d.key===curDay); 
  let sorted=[...day.shows].sort((a,b)=>a.artist.localeCompare(b.artist)); 
  document.getElementById('azlist').innerHTML=sorted.map(show=>{ let si=ST[show.stage]; let isFav=favorites.has(show.artist); return `<div class="az-item"><div class="spill" style="background:${si.color}18;color:${si.color}">${si.e}</div><div style="flex:1">${show.artist}</div><div class="fav-icon ${isFav?'active':''}" onclick="toggleFav('${show.artist.replace(/'/g,"\\'")}'); event.stopPropagation();">${isFav?'❤️':'♡'}</div><div>${show.time}</div></div>`; }).join(''); 
  updateNowPlaying(); 
}
function setDay(k){ curDay=k; curStage=null; renderDayTabs(); if(curView==='schedule') renderSchedule(); else if(curView==='az') renderAZ(); else if(curView==='map') renderMapView(); else if(curView==='favorites') renderFavUI(); updateNowPlaying(); }
function setStage(s){ curStage=s; renderSchedule(); }
function setView(v){ curView=v; document.querySelectorAll('.view').forEach(el=>el.classList.remove('on')); document.getElementById('v'+v).classList.add('on'); document.querySelectorAll('.vt').forEach(el=>el.classList.remove('on')); event.target.classList.add('on'); if(v==='schedule') renderSchedule(); else if(v==='az') renderAZ(); else if(v==='map') renderMapView(); else if(v==='favorites') renderFavUI(); updateNowPlaying(); }
function renderDayTabs(){ document.getElementById('dtabs').innerHTML=DAYS.map(d=>`<button class="dtab${d.key===curDay?' on':''}" onclick="setDay('${d.key}')" style="${d.key===curDay?'border-bottom-color:'+d.bc:''}"><div class="dl">${d.label}</div><div class="ds">${d.sub}</div></button>`).join(''); }
document.getElementById('calcRouteBtn').addEventListener('click',()=>{ let favStages = [...favorites].map(a=>getStageFromArtist(a,curDay)).filter(s=>s); if(favStages.length===0){ alert('请先收藏艺人'); return; } let currentStage = getCurrentShow(DAYS.find(d=>d.key===curDay))?.stage; if(!currentStage){ alert('当前无现场演出'); return; } let best = {dist:Infinity, path:[]}; favStages.forEach(s=>{ let res = dijkstra(currentStage, s); if(res.dist<best.dist) best=res; }); if(best.path.length) document.getElementById('routeResult').innerHTML=`🎯 最优路线: ${best.path.join(' → ')} (${best.dist}分钟)`; else document.getElementById('routeResult').innerText='路径不可达'; });
setInterval(()=>{ updateNowPlaying(); }, 30000);
renderDayTabs(); renderSchedule(); renderFavUI();
if('serviceWorker' in navigator){ navigator.serviceWorker.register(URL.createObjectURL(new Blob([`self.addEventListener('fetch', e=>e.respondWith(fetch(e.request).catch(()=>new Response('🎵 Primavera Sound 2026 - Offline mode',{status:200}))))`], {type:'application/javascript'}))); }
