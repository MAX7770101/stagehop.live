<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="var(--bg)">
  <title>春声 2026 · Primavera Sound</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300&family=Playfair+Display:wght@700;800&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

</head>

<body>


  <div id="hdr">
    <!-- row 1: title + nav buttons -->
    <div class="brand">
      <div class="brand-left">
        <div class="ey" id="lbl-city">Barcelona · Parc del Fòrum · Junio 2026</div>
        <div class="brand-title">
          <div class="title-line">
            <span class="title-zh">春日之声</span>
          </div>
          <div class="title-line">
            <span class="title-en">PRIMAVERA SOUND</span>
          </div>
        </div>
      </div>
      <div class="nav-col">
        <div class="nav-row-btns">
          <button class="vt on" onclick="setView('schedule',this)" title="排班">📅</button>
          <button class="vt" onclick="setView('my',this)" title="我的行程">💖</button>
          <button class="vt" onclick="setView('map',this)" title="地图">🗺️</button>
          <button class="vt" onclick="setView('info',this)" title="实用信息">ℹ️</button>
        </div>
        <div class="lang-theme-row">
          <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="切换主题">🌙</button>
          <div class="lang-grp-inline">
            <button class="lang-btn on" onclick="setLang('zh')" id="lang-zh">中</button>
            <button class="lang-btn" onclick="setLang('es')" id="lang-es">ES</button>
            <button class="lang-btn" onclick="setLang('en')" id="lang-en">EN</button>
          </div>
        </div>
      </div>
    </div>
    <!-- row 2: day tabs -->
    <div id="dtabs"></div>
  </div>

  <div id="now-playing">
    <div class="np-glow"></div>
    <div class="np-label" id="np-label">▶ NOW PLAYING</div>
    <div class="np-artist" id="np-artist"></div>
    <div class="np-stage" id="np-stage"></div>
    <div class="np-time">
      <div class="np-countdown" id="np-countdown"></div>
      <div class="np-until" id="np-until"></div>
    </div>
  </div>

  <!-- SCHEDULE -->
  <div id="vschedule" class="view on">
    <div id="fbar"></div>
    <div id="sort-bar">
      <span class="slbl" id="lbl-sort">排序</span>
      <button class="srt on" id="srt-time" onclick="setSort('time')">⏱ <span data-i="byTime">时间</span></button>
      <button class="srt" id="srt-az" onclick="setSort('az')">🔤 <span data-i="byName">名称</span></button>
    </div>
    <div id="slist"></div>
  </div>

  <!-- MY LINEUP -->
  <div id="vmy" class="view">
    <div id="mylist"></div>
  </div>
