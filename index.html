<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="var(--bg)">
  <title>春声 2026 · Primavera Sound</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300&family=Playfair+Display:wght@700;800&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>

</head>

<body>


  <div id="hdr">
    <!-- row 1: title + nav buttons -->
    <div class="brand">
      <div class="brand-left">
        <div class="brand-title">
          <div class="title-line">
            <span class="title-zh">春日之声</span><span class="title-stagehop">Stage Hop</span>
          </div>
          <div class="title-line">
            <span class="title-en">PRIMAVERA SOUND</span>
          </div>
        </div>
        <div class="ey" id="lbl-city">Barcelona · Parc del Fòrum · Junio 2026</div>
      </div>
      <div class="nav-col">
        <button class="hamburger-btn" id="hamburger-btn" onclick="toggleNavMenu()" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
        <div class="nav-row-btns">
          <button class="vt on" onclick="setView('schedule',this)"><span data-i="navSchedule">排班</span></button>
          <button class="vt" onclick="setView('map',this)"><span data-i="navMap">地图</span></button>
          <button class="vt" onclick="setView('info',this)"><span data-i="navInfo">实用信息</span></button>
        </div>
        <div class="lang-theme-row">
          <button class="theme-btn" id="theme-btn" onclick="toggleTheme()"><span data-i="navTheme">主题</span></button>
          <div class="lang-grp-inline">
            <button class="lang-btn on" onclick="setLang('zh')" data-lang="zh">中</button>
            <span class="lang-sep">·</span>
            <button class="lang-btn" onclick="setLang('es')" data-lang="es">ES</button>
            <span class="lang-sep">·</span>
            <button class="lang-btn" onclick="setLang('en')" data-lang="en">EN</button>
          </div>
        </div>
      </div>
    </div>
    <!-- row 2: day tabs -->
    <div id="dtabs"></div>
  </div>

  <div id="nav-backdrop" onclick="closeNavMenu()"></div>
  <div id="nav-menu" aria-hidden="true">
    <div class="nm-nav-row">
      <button class="nm-nav-item on" data-view="schedule" onclick="setView('schedule');closeNavMenu()"><span data-i="navSchedule">排班</span></button>
      <button class="nm-nav-item" data-view="map" onclick="setView('map');closeNavMenu()"><span data-i="navMap">地图</span></button>
      <button class="nm-nav-item" data-view="info" onclick="setView('info');closeNavMenu()"><span data-i="navInfo">实用信息</span></button>
    </div>
    <div class="nm-settings-row">
      <span class="nm-setting-lbl" data-i="navTheme">主题</span>
      <button class="theme-icon-btn" onclick="toggleTheme()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
    </div>
    <div class="nm-settings-row">
      <span class="nm-setting-lbl" data-i="navLang">语言</span>
      <div class="lang-grp-inline">
        <button class="lang-btn on" onclick="setLang('zh')" data-lang="zh">中</button>
        <span class="lang-sep">·</span>
        <button class="lang-btn" onclick="setLang('es')" data-lang="es">ES</button>
        <span class="lang-sep">·</span>
        <button class="lang-btn" onclick="setLang('en')" data-lang="en">EN</button>
      </div>
    </div>
  </div>

  <div id="now-playing">
    <div id="np-header" class="np-header"></div>
    <div id="np-rows"></div>
    <div id="np-more"></div>
  </div>

  <!-- SCHEDULE -->
  <div id="vschedule" class="view on">
    <div id="fbar"></div>
    <div id="sort-bar">
      <span class="slbl" id="lbl-sort">排序</span>
      <button class="srt on" id="srt-time" onclick="setSort('time')">⏱ <span data-i="byTime">时间</span></button>
      <button class="srt" id="srt-az" onclick="setSort('az')">🔤 <span data-i="byName">名称</span></button>
      <button class="srt srt-fav" id="srt-fav" onclick="toggleFavFilter()">💖</button>
    </div>
    <div id="slist"></div>
  </div>

  <!-- MY LINEUP -->
  <div id="vmy" class="view">
    <div id="mylist"></div>
  </div>

  <!-- MAP -->
  <div id="vmap" class="view">
    <div id="mapview">
      <div class="map-hint-bar">
        <span id="lbl-mapHint">双指缩放 · 点击舞台查看演出</span>
        <span style="display:flex;gap:6px">
          <button class="zbtn" onclick="mapZoom(1.5)">＋</button>
          <button class="zbtn" onclick="mapZoom(0.67)">－</button>
          <button class="rbtn" id="lbl-reset" onclick="mapReset()">复位</button>
        </span>
      </div>
      <div class="map-wrap" id="mapwrap">
        <div class="map-inner" id="mapinner">
          <img id="mapimg" src="assets/map.jfif" alt="venue map">
        </div>
      </div>
      <div id="stagepop"></div>
      <div class="foot" id="mapfoot"></div>
      <a class="map-official-btn" href="https://www.primaverasound.com/barcelona/map" target="_blank" rel="noopener"><span data-i="mapOfficial">点击查看官网高清地图</span> ↗</a>
    </div>
  </div>

  <!-- INFO -->
  <div id="vinfo" class="view"></div>

  <!-- FAV SHEET -->
  <div id="fav-bar">
    <button class="fav-close-btn" onclick="toggleFavBar()">×</button>
    <div class="fav-title" id="lbl-favs">💖 我的收藏</div>
    <div id="fav-list"></div>
  </div>

  <footer id="app-footer"></footer>

  <div class="watermark" style="background:var(--bg)">
    <div class="watermark-text">Made by Max777</div>
    <a class="ig-link" href="https://www.instagram.com/max7770101?igsh=NHBlMThmbWdhZXJo&utm_source=qr"
      target="_blank" rel="noopener">
      <svg class="ig-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z" />
      </svg>
      @max7770101
    </a>
  </div>

  <script type="text/javascript" src="src/localization.js"></script>
  <script type="text/javascript" src="src/data.js"></script>
  <script type="text/javascript" src="src/scripts.js"></script>
</body>

</html>
